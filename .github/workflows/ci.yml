name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  formatting:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          environments: dev
          cache: false

      - name: Check formatting
        run: pixi run format --check .

  linting:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          environments: dev
          cache: false

      - name: Check code
        run: pixi run lint

  type-checking:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          environments: dev
          cache: false

      - name: Check code
        run: pixi run typecheck

  testing:
    runs-on: ubuntu-latest
    # only run if commit message does not start with "chore(main): release"
    if: >-
      !startsWith(github.event.head_commit.message, 'chore(main): release')
    steps:
      - uses: actions/checkout@v6

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0
        with:
          environments: dev minpy
          cache: false

      - name: Run pytest
        run: pixi run -e dev test -v

      - name: Run Coverage
        run: pixi run -e dev coverage-report

      - name: Test min python version
        run: pixi run -e minpy test -v
